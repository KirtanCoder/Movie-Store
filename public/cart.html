<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review your cart and checkout with secure UPI payment via Razorpay.">
  <title>Your Cart — MovieStore</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.lordicon.com/lordicon.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animated">
    <div class="bg-blob"></div>
  </div>

  <!-- Cart Container -->
  <div class="cart-container">
    <div class="page-header" style="padding: 40px 0;">
      <h1>
        <lord-icon src="https://cdn.lordicon.com/pbrgppbb.json" trigger="loop" delay="2000"
          colors="primary:#667eea,secondary:#f093fb" style="width:48px;height:48px"></lord-icon>
        Your <span class="gradient-text">Cart</span>
      </h1>
    </div>

    <!-- Cart Items -->
    <div id="cart-items">
      <div class="loader"><div class="spinner"></div></div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="cart-empty" style="display:none">
      <lord-icon src="https://cdn.lordicon.com/pbrgppbb.json" trigger="loop"
        colors="primary:#f093fb,secondary:#667eea" style="width:120px;height:120px"></lord-icon>
      <h3>Your cart is empty</h3>
      <p>Looks like you haven't added any movies yet. Browse our collection!</p>
      <a href="/movies" class="btn btn-primary mt-2">
        <lord-icon src="https://cdn.lordicon.com/aklfruoc.json" trigger="hover"
          colors="primary:#ffffff" style="width:20px;height:20px"></lord-icon>
        Browse Movies
      </a>
    </div>

    <!-- Cart Summary -->
    <div class="cart-summary" id="cart-summary" style="display:none">
      <h3 style="margin-bottom: 16px;">Order Summary</h3>
      <div class="cart-summary-row">
        <span>Subtotal</span>
        <span id="cart-subtotal">₹0</span>
      </div>
      <div class="cart-summary-row">
        <span>GST (18%)</span>
        <span id="cart-tax">₹0</span>
      </div>
      <div class="cart-summary-row total">
        <span>Total</span>
        <span id="cart-total" style="color: var(--success)">₹0</span>
      </div>
      <div style="display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap;">
        <button class="btn btn-secondary" onclick="clearCart()">
          <lord-icon src="https://cdn.lordicon.com/skkahier.json" trigger="hover"
            colors="primary:#e0e0e0" style="width:18px;height:18px"></lord-icon>
          Clear Cart
        </button>
        <button class="btn btn-primary btn-lg" style="flex:1" id="pay-btn" onclick="initiatePayment()">
          <lord-icon src="https://cdn.lordicon.com/qmksjezq.json" trigger="hover"
            colors="primary:#ffffff" style="width:22px;height:22px"></lord-icon>
          Pay with Razorpay
        </button>
      </div>
    </div>

    <!-- Order History -->
    <div style="margin-top: 48px;" id="order-history-section">
      <h2 class="section-title mb-3">
        <span class="gradient-text">Order</span> History
      </h2>
      <div id="order-history">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2024 <a href="/">MovieStore</a>. Payments secured by Razorpay</p>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/payment.js"></script>
  <script>
    // Load order history
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const data = await fetchAPI('/payment/orders');
        const container = document.getElementById('order-history');
        
        if (!data.orders || data.orders.length === 0) {
          container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px">No orders yet. Start shopping!</p>';
          return;
        }

        container.innerHTML = data.orders.map(order => `
          <div class="order-card">
            <div class="order-header">
              <div>
                <div style="font-size:0.8rem;color:var(--text-muted)">Order #${order._id.slice(-8).toUpperCase()}</div>
                <div style="font-size:0.85rem;color:var(--text-secondary)">${new Date(order.createdAt).toLocaleDateString('en-IN', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' })}</div>
              </div>
              <div style="text-align:right">
                <span class="status-badge ${order.status}">${order.status}</span>
                <div style="font-family:var(--font-heading);font-size:1.2rem;font-weight:700;color:var(--success);margin-top:4px">${formatPrice(order.totalAmount)}</div>
              </div>
            </div>
            <div class="order-items">
              ${order.items.map(item => `
                <div class="order-item-thumb" title="${item.title}">
                  <img src="${item.posterUrl || 'https://via.placeholder.com/50x75/1a1a2e/667eea?text=M'}" alt="${item.title}"
                       onerror="this.src='https://via.placeholder.com/50x75/1a1a2e/667eea?text=M'">
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('order-history').innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px">Unable to load orders</p>';
      }
    });
  </script>
</body>
</html>
