<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your purchased movies library — watch your collection online.">
  <title>My Library — MovieStore</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.lordicon.com/lordicon.js"></script>
  <style>
    .library-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .library-card {
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all var(--transition-normal);
    }

    .library-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border-glass-hover);
    }

    .library-card-top {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--bg-darker);
    }

    .library-card-top img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.7;
      transition: all var(--transition-slow);
    }

    .library-card:hover .library-card-top img {
      opacity: 1;
      transform: scale(1.05);
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      transition: all var(--transition-normal);
      cursor: pointer;
    }

    .play-overlay:hover {
      background: rgba(0,0,0,0.15);
    }

    .play-btn-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
      transition: all var(--transition-normal);
    }

    .play-overlay:hover .play-btn-circle {
      transform: scale(1.15);
      box-shadow: 0 0 50px rgba(102, 126, 234, 0.7);
    }

    .play-btn-circle::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 10px 0 10px 18px;
      border-color: transparent transparent transparent white;
      margin-left: 4px;
    }

    .library-card-info {
      padding: 16px;
    }

    .library-card-info h3 {
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .library-card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .library-card-meta .genre-tag {
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .purchased-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Video Player Modal */
    .player-container {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      margin-bottom: 20px;
    }

    .player-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5;
    }

    .player-center-msg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .player-center-msg lord-icon {
      margin-bottom: 12px;
    }

    .player-center-msg h3 {
      margin-bottom: 8px;
    }

    .player-center-msg p {
      color: var(--text-muted);
      font-size: 0.9rem;
      max-width: 360px;
    }

    .library-stats {
      display: flex;
      gap: 24px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .library-stat {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 24px;
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      flex: 1;
      min-width: 180px;
    }

    .library-stat h4 {
      font-size: 1.4rem;
      font-weight: 800;
    }

    .library-stat p {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      .library-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animated">
    <div class="bg-blob"></div>
  </div>

  <div class="section" style="max-width:1200px; margin:0 auto; padding-top: 100px;">
    <div class="page-header" style="padding: 20px 0 32px; text-align:left;">
      <h1>
        <lord-icon src="https://cdn.lordicon.com/aklfruoc.json" trigger="loop" delay="2000"
          colors="primary:#667eea,secondary:#f093fb" style="width:42px;height:42px"></lord-icon>
        My <span class="gradient-text">Library</span>
      </h1>
      <p style="text-align:left">Your purchased movies — ready to watch anytime</p>
    </div>

    <!-- Library Stats -->
    <div class="library-stats" id="library-stats" style="display:none">
      <div class="library-stat">
        <lord-icon src="https://cdn.lordicon.com/aklfruoc.json" trigger="loop" delay="3000"
          colors="primary:#667eea" style="width:32px;height:32px"></lord-icon>
        <div>
          <h4 id="lib-movie-count">0</h4>
          <p>Movies Owned</p>
        </div>
      </div>
      <div class="library-stat">
        <lord-icon src="https://cdn.lordicon.com/qmksjezq.json" trigger="loop" delay="3000"
          colors="primary:#00e676" style="width:32px;height:32px"></lord-icon>
        <div>
          <h4 id="lib-total-spent">₹0</h4>
          <p>Total Spent</p>
        </div>
      </div>
    </div>

    <!-- Library Grid -->
    <div id="library-content">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 <a href="/">MovieStore</a>. Your Digital Movie Collection</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn()) {
        window.location.href = '/auth';
        return;
      }
      loadLibrary();
    });

    async function loadLibrary() {
      const content = document.getElementById('library-content');

      try {
        const data = await fetchAPI('/payment/orders');
        const orders = data.orders.filter(o => o.status === 'paid');

        if (!orders || orders.length === 0) {
          content.innerHTML = `
            <div class="empty-state">
              <lord-icon src="https://cdn.lordicon.com/aklfruoc.json" trigger="loop"
                colors="primary:#f093fb,secondary:#667eea" style="width:120px;height:120px"></lord-icon>
              <h3>Your library is empty</h3>
              <p>Purchase movies to start building your collection!</p>
              <a href="/movies" class="btn btn-primary mt-2">
                <lord-icon src="https://cdn.lordicon.com/aklfruoc.json" trigger="hover"
                  colors="primary:#ffffff" style="width:20px;height:20px"></lord-icon>
                Browse Movies
              </a>
            </div>
          `;
          return;
        }

        // Collect unique movies from all paid orders
        const movieMap = new Map();
        let totalSpent = 0;

        orders.forEach(order => {
          totalSpent += order.totalAmount;
          order.items.forEach(item => {
            if (!movieMap.has(item.movieId || item.title)) {
              movieMap.set(item.movieId || item.title, {
                ...item,
                purchasedAt: order.createdAt
              });
            }
          });
        });

        const movies = Array.from(movieMap.values());

        // Show stats
        const statsEl = document.getElementById('library-stats');
        statsEl.style.display = 'flex';
        document.getElementById('lib-movie-count').textContent = movies.length;
        document.getElementById('lib-total-spent').textContent = formatPrice(totalSpent);

        // Render library grid
        content.innerHTML = `
          <div class="library-grid">
            ${movies.map(movie => `
              <div class="library-card">
                <div class="library-card-top">
                  <img src="${movie.posterUrl || 'https://via.placeholder.com/480x270/1a1a2e/667eea?text=' + encodeURIComponent(movie.title)}" 
                       alt="${movie.title}"
                       onerror="this.src='https://via.placeholder.com/480x270/1a1a2e/667eea?text=${encodeURIComponent(movie.title)}'">
                  <div class="play-overlay" onclick="playMovie('${movie.title.replace(/'/g, "\\'")}', '${movie.posterUrl || ''}')">
                    <div class="play-btn-circle"></div>
                  </div>
                </div>
                <div class="library-card-info">
                  <h3>${movie.title}</h3>
                  <div class="library-card-meta">
                    <span class="genre-tag">${movie.genre || 'Movie'}</span>
                    <span>★ ${movie.rating ? movie.rating.toFixed(1) : 'N/A'}</span>
                  </div>
                  <div class="purchased-date">
                    Purchased ${new Date(movie.purchasedAt).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;

      } catch (error) {
        content.innerHTML = `
          <div class="empty-state">
            <h3>Unable to load library</h3>
            <p>${error.message}</p>
            <button class="btn btn-primary mt-2" onclick="loadLibrary()">Try Again</button>
          </div>
        `;
      }
    }

    function playMovie(title, posterUrl) {
      const content = `
        <div class="player-container">
          <img src="${posterUrl || 'https://via.placeholder.com/960x540/0a0a1a/667eea?text=' + encodeURIComponent(title)}" 
               alt="${title}"
               onerror="this.src='https://via.placeholder.com/960x540/0a0a1a/667eea?text=${encodeURIComponent(title)}'">
          <div class="player-center-msg">
            <lord-icon src="https://cdn.lordicon.com/aklfruoc.json" trigger="loop"
              colors="primary:#667eea,secondary:#f093fb" style="width:80px;height:80px"></lord-icon>
            <h3>Ready to Watch</h3>
            <p>This is a demo player. In production, integrate a video streaming service or upload movie files to serve here.</p>
          </div>
        </div>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="showToast('Streaming will be available in production!', 'info')">
            ▶ Play Full Movie
          </button>
          <button class="btn btn-secondary" onclick="showToast('Download will be available in production!', 'info')">
            ⬇ Download
          </button>
        </div>
      `;

      openModal(content, { title: '🎬 ' + title, maxWidth: '750px' });
    }
  </script>
</body>
</html>
